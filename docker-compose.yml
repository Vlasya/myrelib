version: '3.8'

services:
  db:
    image: postgres:15
    container_name: myrelib-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myrelib
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: server
    ports:
      - '3000:3000'
    env_file:
      - ./server/.env
    depends_on:
      - db
    volumes:
      - ./server:/app
    restart: unless-stopped

  # client:
  #   build: ./client
  #   ports:
  #     - '5173:5173'
  #   stdin_open: true
  #   tty: true
  #   depends_on:
  #     - server

volumes:
  postgres_data:
