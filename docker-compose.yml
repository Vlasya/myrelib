version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: myrelib-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myrelib
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

